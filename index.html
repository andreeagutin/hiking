<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiking Vision 2025</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f0;
      color: #222;
      padding: 24px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 20px;
      color: #2d6a2d;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .controls input, .controls select {
      padding: 7px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
      background: white;
    }

    .controls input[type="search"] {
      min-width: 200px;
    }

    .btn {
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      font-size: 0.88rem;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }
    .btn-save-html { background: #2d6a2d; color: white; }
    .btn-save-html:hover { background: #3a8a3a; }
    .btn-add { background: #e8f5e9; color: #2d6a2d; border: 1px solid #a5d6a7; }
    .btn-add:hover { background: #c8e6c9; }

    .stats {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 12px;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      font-size: 0.88rem;
    }

    thead th {
      background: #2d6a2d;
      color: white;
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
      user-select: none;
      cursor: pointer;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    thead th:last-child { cursor: default; }
    thead th:hover:not(:last-child) { background: #3a8a3a; }

    thead th .sort-icon { display: inline-block; margin-left: 5px; opacity: 0.5; font-size: 0.75rem; }
    thead th.asc  .sort-icon::after { content: '▲'; opacity: 1; }
    thead th.desc .sort-icon::after { content: '▼'; opacity: 1; }
    thead th:not(.asc):not(.desc) .sort-icon::after { content: '⇅'; }

    tbody tr { border-bottom: 1px solid #eee; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:not(.editing):hover { background: #f5faf5; cursor: pointer; }
    tbody tr:not(.editing):hover td:first-child::before {
      content: '✎ ';
      opacity: 0.35;
      font-size: 0.8em;
    }

    tbody tr.editing { background: #fffbe6; }

    td { padding: 7px 12px; vertical-align: middle; }

    /* Edit inputs */
    td input.edit-input, td select.edit-input {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #aac;
      border-radius: 4px;
      font-size: 0.85rem;
      background: white;
      min-width: 60px;
    }
    td input.edit-input[type="number"] { max-width: 90px; }

    .actions { white-space: nowrap; }
    .btn-ok     { background: #2d6a2d; color: white; padding: 4px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.82rem; margin-right: 4px; }
    .btn-cancel { background: #e0e0e0; color: #444;  padding: 4px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.82rem; margin-right: 4px; }
    .btn-delete { background: #fdecea; color: #b71c1c; padding: 4px 8px;  border-radius: 4px; border: 1px solid #f5c6c6; cursor: pointer; font-size: 0.82rem; }
    .btn-ok:hover     { background: #3a8a3a; }
    .btn-cancel:hover { background: #ccc; }
    .btn-delete:hover { background: #f5c6c6; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .status-Done        { background: #d4edda; color: #1a6b2a; }
    .status-In-progress { background: #fff3cd; color: #856404; }
    .status-Not-started { background: #e2e3e5; color: #555; }
    .diff-easy   { background: #cfe2ff; color: #1a4fa0; }
    .diff-medium { background: #ffe5b4; color: #7a4a00; }

    .no-results { text-align: center; padding: 40px; color: #999; }

    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #2d6a2d; color: white;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.9rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<h1>🏔️ Hiking Vision 2025</h1>

<div class="top-bar">
  <div class="controls">
    <input type="search" id="search" placeholder="Search anything…">
    <select id="filterStatus">
      <option value="">All statuses</option>
      <option>Done</option>
      <option>In progress</option>
      <option>Not started</option>
    </select>
    <select id="filterDiff">
      <option value="">All difficulties</option>
      <option>easy</option>
      <option>medium</option>
    </select>
    <select id="filterMountains"><option value="">All mountains</option></select>
    <select id="filterZone"><option value="">All zones</option></select>
    <select id="filterTip">
      <option value="">All trip types</option>
      <option>Dus-intors</option>
      <option>Dus</option>
    </select>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-add" onclick="addRow()">+ Add row</button>
    <button class="btn btn-save-html" onclick="saveHTML()">⬇ Save HTML</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="table-wrap">
  <table id="hikingTable">
    <thead>
      <tr>
        <th data-col="Name">Name <span class="sort-icon"></span></th>
        <th data-col="Time">Time (h) <span class="sort-icon"></span></th>
        <th data-col="Distance">Distance (km) <span class="sort-icon"></span></th>
        <th data-col="Tip">Type <span class="sort-icon"></span></th>
        <th data-col="Up">Up (m) <span class="sort-icon"></span></th>
        <th data-col="Down">Down (m) <span class="sort-icon"></span></th>
        <th data-col="Difficulty">Difficulty <span class="sort-icon"></span></th>
        <th data-col="Mountains">Mountains <span class="sort-icon"></span></th>
        <th data-col="Status">Status <span class="sort-icon"></span></th>
        <th data-col="Completed">Completed <span class="sort-icon"></span></th>
        <th data-col="Zone">Zone <span class="sort-icon"></span></th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
let DATA = [
  { Name:"Circuitul Cheile Cutii",        Time:1.5,  Distance:3.1,  Tip:"Dus-intors", Up:160, Down:160, Difficulty:"easy",   Mountains:"Muntii Padurea Craiului", Status:"Done",        Completed:"07/03/2026", Zone:"Rosia" },
  { Name:"Apateu - Toplita de Rosia",     Time:1.2,  Distance:3.3,  Tip:"Dus-intors", Up:132, Down:132, Difficulty:"easy",   Mountains:"Muntii Padurea Craiului", Status:"In progress", Completed:"",           Zone:"Rosia" },
  { Name:"Circuitul Valea Dalbii",        Time:1.2,  Distance:4.1,  Tip:"Dus-intors", Up:85,  Down:85,  Difficulty:"easy",   Mountains:"Muntii Padurea Craiului", Status:"In progress", Completed:"",           Zone:"Rosia" },
  { Name:"Pestera cu Cristale Farcu - Izbucul Rosiei", Time:1.66, Distance:4.1, Tip:"Dus-intors", Up:110, Down:null, Difficulty:"easy", Mountains:"Muntii Padurea Craiului", Status:"In progress", Completed:"", Zone:"Rosia" },
  { Name:"Pestera Stracos",               Time:2,    Distance:5.5,  Tip:"Dus-intors", Up:null,Down:null, Difficulty:"easy",  Mountains:"Muntii Padurea Craiului", Status:"Done",        Completed:"13/04/2025", Zone:"Tasad" },
  { Name:"Circuitul Cheile Lazuri",       Time:3,    Distance:5.7,  Tip:"Dus-intors", Up:270, Down:270, Difficulty:"easy",   Mountains:"Muntii Padurea Craiului", Status:"Done",        Completed:"21/04/2025", Zone:"Rosia" },
  { Name:"Rachitele Varful Lespezi",      Time:3.5,  Distance:6.7,  Tip:"Dus-intors", Up:322, Down:322, Difficulty:"easy",   Mountains:"Muntii Vladeasa",         Status:"Done",        Completed:"14/09/2025", Zone:"Rachitele" },
  { Name:"Circuitul galben al defileului Vadu Crisului", Time:4, Distance:7, Tip:"Dus-intors", Up:307, Down:null, Difficulty:"easy", Mountains:"Muntii Padurea Craiului", Status:"Done", Completed:"14/04/2024", Zone:"Vadu Crisului" },
  { Name:"Circuitul Versantului Drept Vadu Crisului", Time:4.5, Distance:7.57, Tip:"Dus-intors", Up:351, Down:351, Difficulty:"easy", Mountains:"Muntii Padurea Craiului", Status:"Done", Completed:"07/04/2024", Zone:"Vadu Crisului" },
  { Name:"Circuitul Versantului Stang",   Time:4,    Distance:7.62, Tip:"Dus-intors", Up:334, Down:334, Difficulty:"easy",   Mountains:"Muntii Padurea Craiului", Status:"Done",        Completed:"31/03/2024", Zone:"Vadu Crisului" },
  { Name:"Suncuius - pestera Batranului", Time:4,    Distance:8,    Tip:"Dus",        Up:316, Down:null, Difficulty:"easy",  Mountains:"Muntii Padurea Craiului", Status:"Done",        Completed:"02/06/2024", Zone:"Suncuius" },
  { Name:"Cabana Pestera vadu crisului - Pestera Batranului", Time:null, Distance:8, Tip:"Dus", Up:376, Down:null, Difficulty:"easy", Mountains:"Muntii Padurea Craiului", Status:"Not started", Completed:"", Zone:"Vadu Crisului" },
  { Name:"Cabana Pestera Vadu Crisului - Suncuius", Time:3.5, Distance:8.5, Tip:"Dus", Up:444, Down:456, Difficulty:"easy", Mountains:"Muntii Padurea Craiului", Status:"Not started", Completed:"", Zone:"Vadu Crisului" },
  { Name:"Circuitul Valea Boiului",       Time:4,    Distance:9,    Tip:"Dus-intors", Up:435, Down:null, Difficulty:"easy",  Mountains:"Muntii Padurea Craiului", Status:"In progress", Completed:"",           Zone:"Bratca" },
  { Name:"Pensiunea Gradia - Pestera Moanei", Time:3.11, Distance:10.4, Tip:"Dus-intors", Up:231, Down:221, Difficulty:"easy", Mountains:"Muntii Padurea Craiului", Status:"Done", Completed:"", Zone:"Suncuius" },
  { Name:"Traseul Bujorul Banatic",       Time:3.5,  Distance:11,   Tip:null,         Up:null,Down:null, Difficulty:null,    Mountains:"Muntii Codru Moma",       Status:"Not started", Completed:"",           Zone:"Beius" },
  { Name:"Cabana Pestera Vadu Crisului - Valea Misidului - Pestera Moanei", Time:4, Distance:12, Tip:"Dus", Up:292, Down:null, Difficulty:"easy", Mountains:"Muntii Padurea Craiului", Status:"Not started", Completed:"", Zone:"Vadu Crisului" },
  { Name:"Circuitul Pesterii Ursilor (Valea Sighistelului)", Time:5.5, Distance:12.52, Tip:"Dus-intors", Up:607, Down:607, Difficulty:"medium", Mountains:"Muntii Padurea Craiului", Status:"In progress", Completed:"", Zone:"Beius" },
  { Name:"Galbena - Varful Bihorul - Galbena", Time:5.8, Distance:14, Tip:"Dus-intors", Up:896, Down:896, Difficulty:"medium", Mountains:"Muntii Bihorului", Status:"Not started", Completed:"", Zone:"Arieseni" },
  { Name:"Vadu Crisului sala - Pestera Batranului", Time:5, Distance:15, Tip:"Dus-intors", Up:400, Down:400, Difficulty:"easy", Mountains:"Muntii Padurea Craiului", Status:"In progress", Completed:"", Zone:"Vadu Crisului" },
  { Name:"Circuitul Pietrele Albe",       Time:6.33, Distance:16.57,Tip:"Dus-intors", Up:666, Down:666, Difficulty:"medium", Mountains:"Muntii Vladeasa",         Status:"Done",        Completed:"21/09/2025", Zone:"Rachitele" },
  { Name:"Cheile Rametului - Vara",       Time:null, Distance:null, Tip:null,         Up:null,Down:null, Difficulty:null,    Mountains:null,                      Status:"Not started", Completed:"",           Zone:null },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let sortCol = null, sortDir = 1;
let editingIndex = null; // index into DATA of currently edited row

// ── FILTERS ───────────────────────────────────────────────────────────────────
function populateDropdowns() {
  const mountains = [...new Set(DATA.map(r => r.Mountains).filter(Boolean))].sort();
  const zones     = [...new Set(DATA.map(r => r.Zone).filter(Boolean))].sort();
  const mSel = document.getElementById('filterMountains');
  const zSel = document.getElementById('filterZone');
  const savedM = mSel.value, savedZ = zSel.value;
  mSel.innerHTML = '<option value="">All mountains</option>';
  zSel.innerHTML = '<option value="">All zones</option>';
  mountains.forEach(m => { const o = document.createElement('option'); o.textContent = m; mSel.appendChild(o); });
  zones.forEach(z => { const o = document.createElement('option'); o.textContent = z; zSel.appendChild(o); });
  mSel.value = savedM; zSel.value = savedZ;
}

function getFiltered() {
  const q      = document.getElementById('search').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const diff   = document.getElementById('filterDiff').value;
  const mnt    = document.getElementById('filterMountains').value;
  const zone   = document.getElementById('filterZone').value;
  const tip    = document.getElementById('filterTip').value;
  return DATA
    .map((r, i) => ({ r, i }))
    .filter(({ r }) => {
      if (status && r.Status !== status) return false;
      if (diff   && r.Difficulty !== diff) return false;
      if (mnt    && r.Mountains !== mnt) return false;
      if (zone   && r.Zone !== zone) return false;
      if (tip    && r.Tip !== tip) return false;
      if (q && !Object.values(r).join(' ').toLowerCase().includes(q)) return false;
      return true;
    });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function n(v) { return v ?? ''; }

function viewCells(r) {
  const sc = 'status-' + (r.Status || '').replace(/\s+/g, '-');
  const dc = r.Difficulty ? 'diff-' + r.Difficulty : '';
  return `
    <td>${n(r.Name)}</td>
    <td>${n(r.Time)}</td>
    <td>${n(r.Distance)}</td>
    <td>${n(r.Tip)}</td>
    <td>${n(r.Up)}</td>
    <td>${n(r.Down)}</td>
    <td>${r.Difficulty ? `<span class="badge ${dc}">${r.Difficulty}</span>` : ''}</td>
    <td>${n(r.Mountains)}</td>
    <td>${r.Status ? `<span class="badge ${sc}">${r.Status}</span>` : ''}</td>
    <td>${n(r.Completed)}</td>
    <td>${n(r.Zone)}</td>
    <td class="actions"><button class="btn-ok" onclick="startEdit(${arguments[1]})">Edit</button></td>`;
}

function editCells(r, dataIdx) {
  const sel = (name, opts, val) =>
    `<select class="edit-input" data-field="${name}">
      <option value=""></option>
      ${opts.map(o => `<option${o === val ? ' selected' : ''}>${o}</option>`).join('')}
    </select>`;
  return `
    <td><input class="edit-input" data-field="Name"       value="${n(r.Name)}"       type="text"></td>
    <td><input class="edit-input" data-field="Time"       value="${n(r.Time)}"       type="number" step="0.01"></td>
    <td><input class="edit-input" data-field="Distance"   value="${n(r.Distance)}"   type="number" step="0.01"></td>
    <td>${sel('Tip',        ['Dus-intors','Dus'],                         r.Tip)}</td>
    <td><input class="edit-input" data-field="Up"         value="${n(r.Up)}"         type="number"></td>
    <td><input class="edit-input" data-field="Down"       value="${n(r.Down)}"       type="number"></td>
    <td>${sel('Difficulty', ['easy','medium'],                            r.Difficulty)}</td>
    <td><input class="edit-input" data-field="Mountains"  value="${n(r.Mountains)}"  type="text"></td>
    <td>${sel('Status',     ['Done','In progress','Not started'],         r.Status)}</td>
    <td><input class="edit-input" data-field="Completed"  value="${n(r.Completed)}"  type="text" placeholder="dd/mm/yyyy"></td>
    <td><input class="edit-input" data-field="Zone"       value="${n(r.Zone)}"       type="text"></td>
    <td class="actions">
      <button class="btn-ok"     onclick="commitEdit(${dataIdx})">Save</button>
      <button class="btn-cancel" onclick="cancelEdit()">Cancel</button>
      <button class="btn-delete" onclick="deleteRow(${dataIdx})">✕</button>
    </td>`;
}

function render() {
  let rows = getFiltered();

  if (sortCol) {
    rows.sort((a, b) => {
      let av = a.r[sortCol] ?? '';
      let bv = b.r[sortCol] ?? '';
      if (sortCol === 'Completed') { av = parseDate(av); bv = parseDate(bv); }
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
  }

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="12" class="no-results">No hikes match your filters.</td></tr>`;
  } else {
    rows.forEach(({ r, i }) => {
      const tr = document.createElement('tr');
      if (i === editingIndex) {
        tr.classList.add('editing');
        tr.innerHTML = editCells(r, i);
      } else {
        tr.innerHTML = viewCells(r, i);
        tr.addEventListener('dblclick', () => startEdit(i));
      }
      tbody.appendChild(tr);
    });
  }

  const shown = rows.length;
  document.getElementById('stats').textContent =
    shown === DATA.length ? `Showing all ${DATA.length} hikes` : `Showing ${shown} of ${DATA.length} hikes`;
}

// ── EDITING ───────────────────────────────────────────────────────────────────
function startEdit(dataIdx) {
  editingIndex = dataIdx;
  render();
  // focus first input
  const first = document.querySelector('tr.editing input, tr.editing select');
  if (first) first.focus();
}

function cancelEdit() {
  // If it was a newly added empty row and user cancels, remove it
  if (editingIndex !== null && !DATA[editingIndex].Name && DATA[editingIndex]._new) {
    DATA.splice(editingIndex, 1);
  }
  editingIndex = null;
  render();
}

function commitEdit(dataIdx) {
  const tr = document.querySelector('tr.editing');
  if (!tr) return;
  const row = DATA[dataIdx];
  tr.querySelectorAll('[data-field]').forEach(el => {
    const field = el.dataset.field;
    let v = el.value.trim();
    if (['Time','Distance','Up','Down'].includes(field)) {
      row[field] = v === '' ? null : parseFloat(v);
    } else {
      row[field] = v === '' ? null : v;
    }
  });
  delete row._new;
  editingIndex = null;
  populateDropdowns();
  render();
  toast('Row saved');
}

function deleteRow(dataIdx) {
  if (!confirm('Delete this row?')) return;
  DATA.splice(dataIdx, 1);
  editingIndex = null;
  populateDropdowns();
  render();
  toast('Row deleted');
}

function addRow() {
  const newRow = { Name:'', Time:null, Distance:null, Tip:null, Up:null, Down:null,
                   Difficulty:null, Mountains:null, Status:'Not started', Completed:'', Zone:null, _new:true };
  DATA.push(newRow);
  editingIndex = DATA.length - 1;
  render();
  document.querySelector('tr.editing')?.scrollIntoView({ behavior:'smooth', block:'center' });
  document.querySelector('tr.editing input')?.focus();
}

// ── SAVE HTML ─────────────────────────────────────────────────────────────────
function saveHTML() {
  const dataStr = JSON.stringify(DATA, null, 2)
    .replace(/<\/script>/gi, '<\\/script>'); // safety

  const src = document.documentElement.outerHTML;
  // Replace the DATA array in the source
  const updated = src.replace(
    /let DATA = \[[\s\S]*?\];/,
    'let DATA = ' + dataStr + ';'
  );

  const blob = new Blob([updated], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('HTML downloaded — replace the existing file');
}

// ── SORTING ───────────────────────────────────────────────────────────────────
function parseDate(s) {
  if (!s) return 0;
  const [d, m, y] = s.split('/');
  return new Date(y, m - 1, d).getTime();
}

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    if (editingIndex !== null) return;
    const col = th.dataset.col;
    if (sortCol === col) {
      sortDir *= -1;
      th.classList.toggle('asc');
      th.classList.toggle('desc');
    } else {
      document.querySelectorAll('thead th').forEach(t => t.classList.remove('asc','desc'));
      sortCol = col;
      sortDir = 1;
      th.classList.add('asc');
    }
    render();
  });
});

// ── FILTERS ───────────────────────────────────────────────────────────────────
['search','filterStatus','filterDiff','filterMountains','filterZone','filterTip']
  .forEach(id => document.getElementById(id).addEventListener('input', render));

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
populateDropdowns();
render();
</script>
</body>
</html>
