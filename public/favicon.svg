<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Body -->
  <circle cx="32" cy="12" r="7" fill="#2d6a4f"/>
  <!-- Torso -->
  <rect x="26" y="20" width="16" height="18" rx="3" fill="#2d6a4f"/>
  <!-- Backpack -->
  <rect x="34" y="20" width="10" height="14" rx="3" fill="#1b4332"/>
  <rect x="35" y="23" width="8" height="8" rx="1" fill="#40916c"/>
  <!-- Left arm -->
  <line x1="26" y1="23" x2="18" y2="34" stroke="#2d6a4f" stroke-width="4" stroke-linecap="round"/>
  <!-- Right arm (with stick) -->
  <line x1="40" y1="23" x2="46" y2="34" stroke="#2d6a4f" stroke-width="4" stroke-linecap="round"/>
  <!-- Hiking stick -->
  <line x1="46" y1="34" x2="50" y2="52" stroke="#74512d" stroke-width="3" stroke-linecap="round"/>
  <!-- Left leg -->
  <line x1="30" y1="38" x2="26" y2="54" stroke="#2d6a4f" stroke-width="5" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="36" y1="38" x2="40" y2="54" stroke="#2d6a4f" stroke-width="5" stroke-linecap="round"/>
  <!-- Left boot -->
  <ellipse cx="24" cy="56" rx="5" ry="3" fill="#1b4332"/>
  <!-- Right boot -->
  <ellipse cx="42" cy="56" rx="5" ry="3" fill="#1b4332"/>
</svg>
