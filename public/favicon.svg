<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <linearGradient id="tGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="50%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <clipPath id="cbClip">
      <rect x="9" y="12" width="82" height="28" rx="3"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="20" fill="url(#bgGrad)"/>

  <!-- T stem -->
  <rect x="37" y="34" width="26" height="55" rx="3" fill="url(#tGrad)"/>

  <!-- T crossbar -->
  <rect x="9" y="12" width="82" height="28" rx="3" fill="url(#tGrad)"/>

  <!-- Mountain silhouette clipped to crossbar -->
  <g clip-path="url(#cbClip)">
    <polygon points="12,40 25,20 38,40" fill="#1e1b4b"/>
    <polygon points="36,40 58,10 80,40" fill="#1e1b4b"/>
  </g>

  <!-- Swoosh arc -->
  <path d="M 9,38 Q 50,52 91,36 C 97,33 100,25 97,18"
        stroke="rgba(255,255,255,0.45)" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Trail winding down stem -->
  <path d="M 60,36 C 55,47 42,54 42,63 C 42,71 54,78 53,87"
        stroke="rgba(255,255,255,0.88)" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Waypoint dots -->
  <circle cx="60" cy="36" r="3.2" fill="white"/>
  <circle cx="42" cy="63" r="3.2" fill="white"/>
  <circle cx="53" cy="87" r="3.2" fill="white"/>
</svg>
