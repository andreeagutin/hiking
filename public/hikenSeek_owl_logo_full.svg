<svg xmlns="http://www.w3.org/2000/svg" width="520" height="160" viewBox="0 0 520 160">

  <!-- OWL GROUP -->
  <!-- Stars -->
  <circle cx="30" cy="18" r="1.8" fill="#FDD835" opacity="0.9"/>
  <circle cx="48" cy="10" r="1.3" fill="#FDD835" opacity="0.7"/>
  <circle cx="65" cy="15" r="1" fill="#FDD835" opacity="0.6"/>
  <circle cx="82" cy="9" r="1.6" fill="#FDD835" opacity="0.8"/>
  <circle cx="98" cy="17" r="1.1" fill="#FDD835" opacity="0.6"/>

  <!-- Trees -->
  <polygon points="18,128 30,104 42,128" fill="#2D6A4F"/>
  <rect x="27" y="127" width="6" height="7" fill="#1B4332"/>
  <polygon points="88,128 100,104 112,128" fill="#2D6A4F"/>
  <rect x="97" y="127" width="6" height="7" fill="#1B4332"/>

  <!-- Branch -->
  <path d="M14,134 Q50,129 65,131 Q80,133 116,128" fill="none" stroke="#6D4C41" stroke-width="5" stroke-linecap="round"/>

  <!-- BODY -->
  <ellipse cx="65" cy="108" rx="22" ry="24" fill="#4A90D9"/>
  <!-- Wings -->
  <path d="M43,98 Q29,106 31,122 Q39,114 49,112" fill="#2E6DA4"/>
  <path d="M87,98 Q101,106 99,122 Q91,114 81,112" fill="#2E6DA4"/>
  <!-- Belly -->
  <ellipse cx="65" cy="114" rx="12" ry="14" fill="#6BAED6"/>
  <circle cx="61" cy="110" r="1.8" fill="#9ECAE1"/>
  <circle cx="69" cy="110" r="1.8" fill="#9ECAE1"/>
  <circle cx="65" cy="117" r="1.8" fill="#9ECAE1"/>
  <circle cx="60" cy="123" r="1.4" fill="#9ECAE1"/>
  <circle cx="70" cy="123" r="1.4" fill="#9ECAE1"/>

  <!-- HEAD -->
  <ellipse cx="65" cy="68" rx="25" ry="23" fill="#4A90D9"/>
  <!-- Ear tufts -->
  <polygon points="52,48 47,32 57,47" fill="#4A90D9"/>
  <polygon points="78,48 83,32 73,47" fill="#4A90D9"/>
  <polygon points="52,48 48,40 55,47" fill="#6BAED6"/>
  <polygon points="78,48 82,40 75,47" fill="#6BAED6"/>
