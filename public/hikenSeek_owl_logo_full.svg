  <ellipse cx="65" cy="70" rx="19" ry="17" fill="#1A3A5C"/>

  <!-- Left eye -->
  <circle cx="56" cy="66" r="9" fill="#FFF9C4"/>
  <circle cx="56" cy="66" r="6.5" fill="#E67E00"/>
  <circle cx="56" cy="66" r="4" fill="#0D1F3C"/>
  <circle cx="54" cy="63.5" r="1.5" fill="#FFFFFF"/>

  <!-- Right eye -->
  <circle cx="74" cy="66" r="9" fill="#FFF9C4"/>
  <circle cx="74" cy="66" r="6.5" fill="#E67E00"/>
  <circle cx="74" cy="66" r="4" fill="#0D1F3C"/>
  <circle cx="72" cy="63.5" r="1.5" fill="#FFFFFF"/>

  <!-- Beak -->
  <polygon points="62,75 65,83 68,75" fill="#FFB300"/>
  <line x1="62" y1="78" x2="68" y2="78" stroke="#E65100" stroke-width="1" stroke-linecap="round"/>

  <!-- Backpack -->
  <rect x="79" y="93" width="13" height="16" rx="3" fill="#F4A61D"/>
  <rect x="81" y="90" width="9" height="5" rx="2" fill="#E09000"/>
  <rect x="82" y="100" width="9" height="5" rx="2" fill="#D07800"/>
  <line x1="79" y1="96" x2="76" y2="105" stroke="#D07800" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Feet -->
  <line x1="57" y1="131" x2="53" y2="138" stroke="#6D4C41" stroke-width="2" stroke-linecap="round"/>
  <line x1="57" y1="131" x2="57" y2="139" stroke="#6D4C41" stroke-width="2" stroke-linecap="round"/>
  <line x1="57" y1="131" x2="61" y2="138" stroke="#6D4C41" stroke-width="2" stroke-linecap="round"/>
  <line x1="73" y1="131" x2="69" y2="138" stroke="#6D4C41" stroke-width="2" stroke-linecap="round"/>
  <line x1="73" y1="131" x2="73" y2="139" stroke="#6D4C41" stroke-width="2" stroke-linecap="round"/>
  <line x1="73" y1="131" x2="77" y2="138" stroke="#6D4C41" stroke-width="2" stroke-linecap="round"/>

  <!-- TEXT GROUP -->
  <!-- Main wordmark -->
  <text x="140" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Hike</text>
  <text x="278" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="400" fill="#F4A61D">'n'</text>
  <text x="308" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Seek</text>

  <!-- Tagline -->
  <text x="141" y="106" font-family="Georgia, serif" font-size="13" font-weight="400" fill="#F4A61D" letter-spacing="3.5">EXPLORE · TOGETHER · DISCOVER</text>

  <!-- Divider -->
  <line x1="141" y1="115" x2="490" y2="115" stroke="#4A90D9" stroke-width="0.8" opacity="0.6"/>

  <!-- Sub tagline -->
  <text x="141" y="132" font-family="Georgia, serif" font-size="13" font-weight="400" fill="#9ECAE1" letter-spacing="0.5">hiking adventures for families</text>

</svg>
